# Codemagic CI/CD — builds Lowkey Maps for iOS in the cloud (no Mac needed) and
# uploads it to TestFlight.
#
# Signing uses Codemagic AUTOMATIC code signing: with the App Store Connect API key
# integration ("Codemagic") + the ios_signing block below, Codemagic creates and
# manages the distribution certificate (and its private key) and the provisioning
# profile for you before each build.

workflows:
  ios-testflight:
    name: iOS · TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: Codemagic   # name of the API-key integration (Personal account)
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.lowkeymaps.lowkeyMaps
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_STORE_APPLE_ID: 6785916878
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Set up code signing (automatic)
        script: xcode-project use-profiles
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build signed IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # Optional: also build the Android side here if you ever want one pipeline.
  android-internal:
    name: Android · build
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
