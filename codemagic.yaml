# Codemagic CI/CD — builds Lowkey Maps for iOS in the cloud (no Mac needed) and
# uploads it to TestFlight.
#
# Signing: the build uses your App Store Connect API key ("Codemagic" integration)
# plus a reusable certificate private key stored in the secure env var
# CERTIFICATE_PRIVATE_KEY. On the first run it CREATES the distribution certificate
# + provisioning profile; later runs reuse them. (Reusing the same private key means
# it won't keep making new certificates.)

workflows:
  ios-testflight:
    name: iOS · TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: Codemagic   # API-key integration name (Personal account)
    environment:
      groups:
        - ios_signing            # must contain a SECURE var: CERTIFICATE_PRIVATE_KEY
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "app.lowkeymaps.lowkeyMaps"
        APP_STORE_APPLE_ID: 6785916878
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch / create signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key="@env:CERTIFICATE_PRIVATE_KEY" \
            --create
      - name: Add certificate to keychain
        script: keychain add-certificates
      - name: Set up provisioning profiles in Xcode
        script: xcode-project use-profiles
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build signed IPA
        script: |
          # Auto-bump the build number above whatever is already in TestFlight,
          # so uploads never collide on a duplicate build number.
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          BUILD_NUMBER=$(( ${LATEST:-0} + 1 ))
          echo "Using build number $BUILD_NUMBER"
          flutter build ipa --release --build-number=$BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        # Upload to TestFlight only. Internal testers get it immediately; submit for
        # external/public Beta App Review manually in App Store Connect (once per version)
        # to avoid "another build is already in review" failures on every build.
        submit_to_testflight: false

  # Optional: also build the Android side here if you ever want one pipeline.
  android-internal:
    name: Android · build
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
