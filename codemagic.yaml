# Codemagic CI/CD — builds Lowkey Maps for iOS in the cloud (no Mac needed) and
# uploads it to TestFlight. See README_IOS_TESTFLIGHT.md for the one-time setup.
#
# Signing is fully automatic: the "fetch-signing-files --create" step uses your
# App Store Connect API key (the "Codemagic" integration) to create the
# distribution certificate + provisioning profile if they don't exist yet.

workflows:
  ios-testflight:
    name: iOS · TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: Codemagic   # name of the API-key integration in Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "app.lowkeymaps.lowkeyMaps"
        APP_STORE_APPLE_ID: 6785916878
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch / create signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up provisioning profiles in Xcode
        script: xcode-project use-profiles
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build signed IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Optional: auto-add testers to a TestFlight group you create
        # beta_groups:
        #   - Field Crew

  # Optional: also build the Android side here if you ever want one pipeline.
  android-internal:
    name: Android · build
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
